<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>협업 캔버스 프로젝트</title>
    <!-- Supabase 클라이언트 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 모던 SaaS 스타일 CSS 초기화 및 변수 설정 */
        :root {
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --secondary: #475569;
        }

        body {
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- 공통 컴포넌트 --- */
        input {
            width: 100%; padding: 10px 12px; margin-bottom: 12px; border: 1px solid var(--border); 
            border-radius: 6px; box-sizing: border-box; font-size: 14px; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); }
        
        button {
            padding: 10px 16px; border: none; border-radius: 6px; font-weight: 600; font-size: 14px; 
            cursor: pointer; transition: background-color 0.2s, color 0.2s;
        }
        .btn-primary { background-color: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-danger:hover { background-color: var(--danger-hover); }
        .btn-secondary { background-color: var(--border); color: var(--text-main); }
        .btn-secondary:hover { background-color: #cbd5e1; }
        .btn-success { background-color: var(--success); color: white; }

        /* --- 0. 인증 오버레이 --- */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .auth-box {
            background: var(--surface); padding: 40px; border-radius: 12px; width: 340px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .auth-box h2 { margin: 0 0 24px 0; font-size: 20px; font-weight: 700; text-align: center; }
        .auth-toggle { font-size: 13px; color: var(--text-muted); cursor: pointer; text-align: center; margin-top: 16px; }
        .auth-toggle:hover { color: var(--text-main); text-decoration: underline; }
        #loginForm { display: block; } #signupForm { display: none; }

        /* --- 1. 대시보드 로비 --- */
        #lobbyScreen { display: none; flex-direction: column; align-items: center; padding: 60px 20px; flex: 1; overflow-y: auto; }
        .lobby-header { text-align: center; margin-bottom: 48px; }
        .lobby-header h1 { font-size: 28px; margin: 0 0 12px 0; font-weight: 800; letter-spacing: -0.5px; }
        .user-badge { background: var(--secondary); color: white; padding: 6px 12px; border-radius: 16px; font-size: 13px; font-weight: 600; display: inline-block; }
        
        .lobby-content { display: flex; gap: 24px; width: 100%; max-width: 800px; align-items: flex-start; }
        .panel { background: var(--surface); padding: 24px; border-radius: 12px; border: 1px solid var(--border); flex: 1; }
        .panel h3 { margin: 0 0 20px 0; font-size: 16px; font-weight: 600; color: var(--text-main); border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        
        .room-item {
            display: flex; justify-content: space-between; align-items: center; padding: 16px; 
            border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; transition: border-color 0.2s;
        }
        .room-item:hover { border-color: var(--primary); }
        .room-title { font-weight: 600; font-size: 15px; color: var(--text-main); }
        .room-meta { font-size: 12px; color: var(--text-muted); margin-left: 8px; font-weight: 400; }
        .status-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; font-weight: 600; }
        .status-private { background: #fee2e2; color: #b91c1c; }
        .status-public { background: #e0e7ff; color: #4338ca; }

        /* --- 2. 메인 워크스페이스 --- */
        #mainWorkspace { display: none; flex-direction: column; height: 100vh; }
        #toolbar {
            padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap; box-shadow: 0 1px 2px rgba(0,0,0,0.05); z-index: 10;
        }
        .toolbar-divider { width: 1px; height: 24px; background: var(--border); margin: 0 8px; }
        .tool-group { display: flex; align-items: center; gap: 8px; }
        
        #workspaceContent { display: flex; flex: 1; overflow: hidden; background: var(--bg-color); }
        .canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 24px; overflow: auto; }
        canvas { background: white; border-radius: 4px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); cursor: crosshair; touch-action: none; border: 1px solid var(--border); }

        /* --- 3. 채팅 UI --- */
        .chat-container { width: 320px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .chat-header { padding: 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; color: var(--text-main); }
        .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .chat-msg { font-size: 13px; line-height: 1.5; color: var(--text-main); }
        .chat-msg b { font-weight: 600; color: var(--primary); }
        .chat-msg.system { color: var(--text-muted); font-size: 12px; text-align: center; background: var(--bg-color); border-radius: 4px; padding: 6px; }
        .chat-input-area { display: flex; padding: 16px; border-top: 1px solid var(--border); }
        .chat-input-area input { flex: 1; margin: 0; border-radius: 6px 0 0 6px; }
        .chat-input-area button { border-radius: 0 6px 6px 0; }
    </style>
</head>
<body>

    <!-- 0. 인증 -->
    <div id="authOverlay">
        <div class="auth-box">
            <div id="loginForm">
                <h2>로그인</h2>
                <input type="text" id="loginId" placeholder="아이디" autofocus>
                <input type="password" id="loginPw" placeholder="비밀번호">
                <button class="btn-primary" id="doLoginBtn">로그인</button>
                <div class="auth-toggle" id="showSignupBtn">계정이 없으신가요? 회원가입</div>
            </div>
            <div id="signupForm">
                <h2>회원가입</h2>
                <input type="text" id="signupId" placeholder="아이디">
                <input type="password" id="signupPw" placeholder="비밀번호">
                <input type="text" id="signupNick" placeholder="닉네임">
                <button class="btn-primary" id="doSignupBtn" style="background-color: var(--success);">가입 완료</button>
                <div class="auth-toggle" id="showLoginBtn">이미 계정이 있으신가요? 로그인</div>
            </div>
        </div>
    </div>

    <!-- 1. 로비 -->
    <div id="lobbyScreen">
        <div class="lobby-header">
            <h1>워크스페이스 로비</h1>
            <div class="user-badge" id="userGreetingMsg">대기 중</div>
        </div>
        <div class="lobby-content">
            <div class="panel">
                <h3>새로운 방 생성</h3>
                <input type="text" id="newRoomName" placeholder="방 이름 입력">
                <input type="password" id="newRoomPw" placeholder="비밀번호 (선택사항)">
                <button class="btn-primary" id="createRoomBtn">생성 및 입장</button>
            </div>
            <div class="panel" style="flex: 1.5;">
                <h3>현재 개설된 세션</h3>
                <div id="roomListContainer"></div>
            </div>
        </div>
    </div>

    <!-- 2. 워크스페이스 -->
    <div id="mainWorkspace">
        <div id="toolbar">
            <button id="exitBtn" class="btn-secondary">로비로 이동</button>
            <div class="toolbar-divider"></div>
            
            <div style="font-weight: 600; font-size: 14px;" id="roomInfoDisplay">방 이름</div>
            <button id="togglePrivacyBtn" class="btn-secondary" style="margin-left: 8px; font-size: 12px; padding: 6px 10px;">상태: 공개</button>
            
            <div class="toolbar-divider"></div>
            
            <div class="tool-group">
                <input type="color" id="colorPicker" value="#0f172a" style="width: 32px; height: 32px; padding: 0; border: none; cursor: pointer; margin: 0;">
                <input type="range" id="lineWidth" min="1" max="50" value="3" style="margin: 0; width: 100px;">
            </div>
            
            <div class="toolbar-divider"></div>
            
            <button id="drawModeBtn" class="btn-secondary" style="background: var(--text-main); color: white;">펜</button>
            <button id="eraserBtn" class="btn-secondary">지우개</button>
            <button id="clearBtn" class="btn-secondary">초기화</button>
            <button id="saveBtn" class="btn-secondary">저장</button>
            
            <button id="reportBtn" class="btn-danger" style="margin-left: auto;">유저 신고</button>
        </div>
        
        <div id="workspaceContent">
            <div class="canvas-container">
                <canvas id="drawingBoard" width="1000" height="700"></canvas>
            </div>
            <div class="chat-container">
                <div class="chat-header">실시간 채팅</div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="메시지 입력">
                    <button class="btn-primary" id="chatSendBtn" style="width: auto;">전송</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ==========================================
           [백엔드 설정] Supabase 초기화 영역
           실제 서비스 배포 시 아래 키를 본인의 프로젝트 키로 변경해야 합니다.
        ========================================== */
        const SUPABASE_URL = 'https://your-project-id.supabase.co';
        const SUPABASE_ANON_KEY = 'your-anon-key';
        
        // Supabase 클라이언트 (주석을 풀고 사용)
        // const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        // let roomChannel = null; // 실시간 통신을 위한 채널 변수

        // --- 임시 상태 (DB 연동 전까지 UI 테스트용) ---
        const mockUserDB = { "test": { pw: "1234", nick: "테스트계정" } };
        let currentUserNick = '';
        let currentRoom = '';
        let isEraserMode = false;
        let activeRooms = [
            { id: 1, name: '메인 디자인 회의', users: 3, hasPw: false, pw: '' },
            { id: 2, name: '기밀 프로젝트', users: 1, hasPw: true, pw: '1234' }
        ];

        // --- 인증 폼 전환 ---
        document.getElementById('showSignupBtn').addEventListener('click', () => { document.getElementById('loginForm').style.display='none'; document.getElementById('signupForm').style.display='block'; });
        document.getElementById('showLoginBtn').addEventListener('click', () => { document.getElementById('signupForm').style.display='none'; document.getElementById('loginForm').style.display='block'; });
        
        // --- 인증 로직 (프론트엔드 임시 처리) ---
        // 백엔드 연동 시: supabase.auth.signUp() 및 signInWithPassword() 사용
        document.getElementById('doSignupBtn').addEventListener('click', () => {
            const id = document.getElementById('signupId').value.trim(), pw = document.getElementById('signupPw').value.trim(), nick = document.getElementById('signupNick').value.trim();
            if (!id || !pw || !nick) return;
            mockUserDB[id] = { pw, nick };
            alert("가입이 완료되었습니다.");
            document.getElementById('showLoginBtn').click();
        });

        document.getElementById('doLoginBtn').addEventListener('click', () => {
            const id = document.getElementById('loginId').value.trim(), pw = document.getElementById('loginPw').value.trim();
            const user = mockUserDB[id];
            if (user && user.pw === pw) {
                currentUserNick = user.nick;
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('lobbyScreen').style.display = 'flex';
                document.getElementById('userGreetingMsg').innerText = currentUserNick;
                renderRoomList();
            } else { alert("인증에 실패했습니다."); }
        });

        // --- 방 리스트 렌더링 ---
        // 백엔드 연동 시: supabase.from('rooms').select('*') 로 데이터 호출
        function renderRoomList() {
            const container = document.getElementById('roomListContainer');
            container.innerHTML = '';
            activeRooms.forEach(room => {
                const el = document.createElement('div'); el.className = 'room-item';
                const statusBadge = room.hasPw ? '<span class="status-badge status-private">비공개</span>' : '<span class="status-badge status-public">공개</span>';
                el.innerHTML = `
                    <div>
                        <span class="room-title">${room.name}</span>
                        ${statusBadge}
                        <span class="room-meta">${room.users}명 접속중</span>
                    </div>
                    <button class="btn-secondary" style="padding: 6px 12px;" onclick="tryJoinRoom(${room.id})">참여</button>`;
                container.appendChild(el);
            });
        }

        document.getElementById('createRoomBtn').addEventListener('click', () => {
            const name = document.getElementById('newRoomName').value.trim();
            const pw = document.getElementById('newRoomPw').value.trim();
            if (!name) return;
            // 백엔드 연동 시: supabase.from('rooms').insert([{ name, password: pw, is_private: pw.length > 0 }])
            activeRooms.push({ id: Date.now(), name: name, users: 1, hasPw: pw.length > 0, pw: pw });
            renderRoomList(); enterCanvas(name);
        });

        window.tryJoinRoom = function(roomId) {
            const room = activeRooms.find(r => r.id === roomId);
            if (room.hasPw) {
                const inputPw = prompt(`비밀번호 입력:`);
                if (inputPw !== room.pw) return alert("비밀번호가 일치하지 않습니다.");
            }
            enterCanvas(room.name);
        };

        // --- 방 진입 및 실시간 통신 준비 ---
        const togglePrivacyBtn = document.getElementById('togglePrivacyBtn');

        function enterCanvas(roomName) {
            currentRoom = roomName;
            document.getElementById('lobbyScreen').style.display = 'none';
            document.getElementById('mainWorkspace').style.display = 'flex';
            document.getElementById('roomInfoDisplay').innerText = currentRoom;
            
            const roomData = activeRooms.find(r => r.name === currentRoom);
            if(roomData) togglePrivacyBtn.innerText = roomData.hasPw ? '상태: 비공개' : '상태: 공개';

            document.getElementById('chatMessages').innerHTML = '';
            addChatMessage(`시스템: 세션에 연결되었습니다.`, true);
            initCanvas();

            /* ==========================================
               [백엔드] Supabase Realtime 채널 구독 로직
            ========================================== */
            /*
            roomChannel = supabase.channel(`room:${currentRoom}`);
            
            // 1. 다른 사람의 드로잉 데이터 수신
            roomChannel.on('broadcast', { event: 'draw' }, payload => {
                const { x, y, lastX, lastY, color, width } = payload.payload;
                ctx.strokeStyle = color; ctx.lineWidth = width;
                ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
            });

            // 2. 다른 사람의 채팅 수신
            roomChannel.on('broadcast', { event: 'chat' }, payload => {
                addChatMessage(`<b>${payload.payload.nick}:</b> ${payload.payload.text}`);
            });

            roomChannel.subscribe();
            */
        }

        // 상태 전환 (방장 권한)
        togglePrivacyBtn.addEventListener('click', () => {
            const roomData = activeRooms.find(r => r.name === currentRoom);
            if (!roomData) return;
            if (roomData.hasPw) {
                if(confirm('공개 세션으로 전환하시겠습니까?')) {
                    roomData.hasPw = false; roomData.pw = '';
                    togglePrivacyBtn.innerText = '상태: 공개';
                    addChatMessage(`시스템: 공개 세션으로 전환되었습니다.`, true);
                    renderRoomList();
                    // 백엔드 연동 시: supabase.from('rooms').update({ is_private: false }).eq('name', currentRoom)
                }
            } else {
                const newPw = prompt('설정할 비밀번호를 입력하세요:');
                if (newPw) {
                    roomData.hasPw = true; roomData.pw = newPw;
                    togglePrivacyBtn.innerText = '상태: 비공개';
                    addChatMessage(`시스템: 비공개 세션으로 전환되었습니다.`, true);
                    renderRoomList();
                }
            }
        });

        document.getElementById('exitBtn').addEventListener('click', () => {
            document.getElementById('mainWorkspace').style.display = 'none';
            document.getElementById('lobbyScreen').style.display = 'flex';
            // 백엔드 연동 시: if(roomChannel) supabase.removeChannel(roomChannel);
        });

        // --- 채팅 로직 ---
        const chatInput = document.getElementById('chatInput');
        function addChatMessage(msg, isSystem = false) {
            const div = document.createElement('div');
            div.className = `chat-msg ${isSystem ? 'system' : ''}`;
            div.innerHTML = msg;
            document.getElementById('chatMessages').appendChild(div);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            addChatMessage(`<b>${currentUserNick}:</b> ${text}`);
            chatInput.value = '';
            
            // 백엔드 연동 시: 
            // roomChannel.send({ type: 'broadcast', event: 'chat', payload: { nick: currentUserNick, text: text } });
        }
        document.getElementById('chatSendBtn').addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        // --- 캔버스 드로잉 및 브로드캐스트 로직 ---
        const canvas = document.getElementById('drawingBoard'); const ctx = canvas.getContext('2d');
        const drawModeBtn = document.getElementById('drawModeBtn');
        const eraserBtn = document.getElementById('eraserBtn');

        drawModeBtn.addEventListener('click', () => { 
            isEraserMode = false; canvas.style.cursor = 'crosshair'; 
            drawModeBtn.style.background = 'var(--text-main)'; drawModeBtn.style.color = 'white';
            eraserBtn.style.background = 'var(--surface)'; eraserBtn.style.color = 'var(--text-main)';
        });
        eraserBtn.addEventListener('click', () => { 
            isEraserMode = true; canvas.style.cursor = 'cell'; 
            eraserBtn.style.background = 'var(--text-main)'; eraserBtn.style.color = 'white';
            drawModeBtn.style.background = 'var(--surface)'; drawModeBtn.style.color = 'var(--text-main)';
        });
        
        document.getElementById('clearBtn').addEventListener('click', () => { if(confirm('초기화하시겠습니까?')) { ctx.fillStyle="white"; ctx.fillRect(0, 0, canvas.width, canvas.height); } });
        document.getElementById('saveBtn').addEventListener('click', () => { const a = document.createElement('a'); a.download = `canvas_export.png`; a.href = canvas.toDataURL('image/png'); a.click(); });

        function initCanvas() {
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            let isDrawing = false, lastX = 0, lastY = 0;
            
            canvas.addEventListener('mousemove', (e) => {
                if (isDrawing) {
                    const color = isEraserMode ? "white" : document.getElementById('colorPicker').value;
                    const width = isEraserMode ? document.getElementById('lineWidth').value * 2 : document.getElementById('lineWidth').value;
                    
                    ctx.strokeStyle = color; ctx.lineWidth = width;
                    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke();
                    
                    // 백엔드 연동 시: 드로잉 좌표 브로드캐스트 전송 (Throttling 적용 필요)
                    /*
                    roomChannel.send({ 
                        type: 'broadcast', event: 'draw', 
                        payload: { lastX, lastY, x: e.offsetX, y: e.offsetY, color, width } 
                    });
                    */
                    
                    lastX = e.offsetX; lastY = e.offsetY;
                }
            });
            canvas.addEventListener('mousedown', (e) => { isDrawing = true; lastX = e.offsetX; lastY = e.offsetY; });
            window.addEventListener('mouseup', () => isDrawing = false);
        }
    </script>
</body>
</html>
